<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home work</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
  </head>

  <body class="bg-black p-2 container mx-auto">
    <header class="flex justify-between border border-white p-2">
        <button id="menu-btn" class="block md:hidden border border-white p-2">
            <div class="w-[13px] h-[1px] bg-white mb-1"></div>
            <div class="w-[13px] h-[1px] bg-white mb-1"></div>
            <div class="w-[13px] h-[1px] bg-white"></div>
        </button>
        <a><img src="pictures/Logo-phone.png"></a>
        <nav>
         <ul id="menu" class="hidden md:flex gap-6">
            <li><a href="#" class="text-white hover:text-gray-400">КАЛЕНДАР ПОДІЙ</a></li>
            <li><a href="#" class="text-white hover:text-gray-400">ПОСЛУГИ</a></li>
            <li><a href="#" class="text-white hover:text-gray-400">ПРО НАС</a></li>
            <li><a href="#" class="text-white hover:text-gray-400">КОНТАКТИ</a></li>
          </ul>
        </nav>
        <nav>
          <ul class="flex justify-center items-center">
            <li><a href="#" class="flex justify-center items-center border border-white w-8 h-8"><img src="pictures/header-search.png" alt="header-search"></a></li>
            <li><a href="#" class="flex justify-center items-center border border-white w-8 h-8"><img src="pictures/header-heart.png" alt="header-heart"></a></li>
            <li><a href="#" class="flex justify-center items-center border border-white w-8 h-8"><img src="pictures/header-basket.png" alt="header-basket"></a></li>
          </ul>
        </nav>
        <button class="bg-white text-black font-['Sofia_Sans'] font-bold text-[12px] leading-[16px] tracking-normal uppercase align-middle py-2 px-5">Вибрати гру</button>
    </header>
    <section class="px-[10px] py-[14px] border border-white text-white">
      <nav>
        <ul class="flex uppercase text-[12px]">
          <li><a class="text-gray-400" href="#">Головна </a></li>
          <span class="text-gray-400 mx-1">&mdash;</span>
          <li><a class="text-gray-400" href="#">Особистий кабінет</a></li>
          <span class="mx-1">&ndash;</span>
          <li><a href="#">Мій профіль</a></li>
        </ul>
      </nav>
    </section>
    <section class="p-[10px] flex items-center justify-between border border-white text-white">
      <a href="#" class="uppercase text-[24px]">мій профіль</a>
      <a href="#"><img src="pictures/right_arrow_icon.png" alt="right_arrow_icon"></a>
    </section>
    <section class="p-[10px] border border-white">
      <h1 class="flex gap-4 items-center text-white font-bold text-[24px] mb-[10px]"><img src="pictures/Avatar.png" alt="Avatar">Shokwave</h1>
      <span class="border border-white/20 text-white px-[12px] py-[6px] text-[12px]">В грі з 2024</span>
      <span class="border border-white/20 text-white px-[12px] py-[6px] text-[12px]">42 Досягнення</span>
      <button class="w-full bg-orange-600 py-[12px] font-bold uppercase mt-[10px] mb-[12px]">Редагувати профіль</button>
      <button class="w-full py-[12px] border border-white/50 font-bold uppercase text-white">Редагувати екіпірування</button>
    </section>
    <section class="grid grid-cols-2 border border-white p-[10px] text-white">
      <div class="border border-white/20 mb-3 mr-3 p-4">
        <img class="pb-2" src="pictures/award01.png" alt="award01">
        <p class="text-[20px] text-bold">2450</p>
        <p class="text-[10px] text-gray-400">Рейтинг Гравця</p>
      </div>
      <div class="border border-white/20 mb-3 p-4">
        <img class="pb-2" src="pictures/target01.png" alt="target01">
        <p class="text-[20px] text-bold">68%</p>
        <p class="text-[10px] text-gray-400">Відсоток Перемог</p>
      </div>
      <div class="border border-white/20 mr-3 p-4">
        <img class="pb-2" src="pictures/user-group.png" alt="user-group">
        <p class="text-[20px] text-bold">156</p>
        <p class="text-[10px] text-gray-400">Всього Ігор</p>
      </div>
      <div class="border border-white/20 p-4">
        <img class="pb-2" src="pictures/chart01.png" alt="chart01">
        <p class="text-[20px] text-bold">4.2</p>
        <p class="text-[10px] text-gray-400">K/D Ratio</p>
      </div>
    </section>
