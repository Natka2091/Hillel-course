<!DOCTYPE html>
  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="reset.css">
  <link rel="stylesheet" type="text/css" href="styles.css">
  <link rel="stylesheet" type="text/css" href="header.css">
  <link rel="stylesheet" type="text/css" href="main.css">
  <link rel="stylesheet" type="text/css" href="footer.css">
  <title>Home work</title>
</head>

<body>
    <header class="header">
        <section class="header_top">
            <img class="vector-tablet-menu" src="pictures/tablet-menu.svg" alt="tablet-menu">
            <div class="header_search">
                <img src="pictures/vector-search.svg" alt="vector-search">
                <input class="header_input" type="search" placeholder="Type here to search" aria-label="Пошук по сайту">
            </div>
            <img class="logo" src="pictures/logo.svg" alt="logo">
            <img class="vector-tablet-basket" src="pictures/tablet-basket.svg" alt="tablet-basket">
            <div class="header_login-cart">
                <span>Login</span>
                <span>Cart 0</span>
            </div>
        </section>
        <section class="header_bottom">
            <nav>
                <ul class="header_menu">
                    <li>What's new</li>
                    <li>Chokers</li>
                    <li>Necklaces</li>
                    <li>Rings</li>
                    <li>Earrings</li>

            </nav>
